SM_config1:
  # Soil Moisture specialized configuration
  # Requirements: single input feature, single output, 24 nodes
  tcn_channels: [32, 64]
  latent_channels: [16, 32]
  emd_channel: 16
  num_latent_layers: 1
  observation_hidden_dim: 128
  num_observation_layers: 3
  tcn_kernel_size: 3
  dropout: 0.1

SM_config2:
  # Lighter configuration for soil moisture (fewer parameters)
  tcn_channels: [16, 32]
  latent_channels: [16]
  emd_channel: 8
  num_latent_layers: 1
  observation_hidden_dim: 64
  num_observation_layers: 2
  tcn_kernel_size: 3
  dropout: 0.1

SM_config3:
  # Deeper configuration for better temporal modeling
  tcn_channels: [32, 64, 128]
  latent_channels: [16, 32, 64]
  emd_channel: 16
  num_latent_layers: 2
  observation_hidden_dim: 128
  num_observation_layers: 3
  tcn_kernel_size: 3
  dropout: 0.1

SM_config4:
  # Extended configuration with higher capacity
  tcn_channels: [32, 64, 128, 256]
  latent_channels: [16, 32, 64, 128]
  emd_channel: 16
  num_latent_layers: 2
  observation_hidden_dim: 256
  num_observation_layers: 4
  tcn_kernel_size: 3
  dropout: 0.15
